name: Validate
permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - changeset-release/main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [node-20, node-22, node-24, bun]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 20.x
        if: matrix.runtime == 'node-20'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x

      - name: Use Node.js 22.x
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Use Node.js 24.x
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        name: Install Bun

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run build --filter ultracite

  test:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [node-20, node-22, node-24, bun]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 20.x
        if: matrix.runtime == 'node-20'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x

      - name: Use Node.js 22.x
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - name: Use Node.js 24.x
        if: matrix.runtime == 'node-24'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        name: Install Bun

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 22.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        name: Install Bun

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run build --filter ultracite

      - name: Check linting and formatting
        run: bun run check

  types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        name: Install Bun

      - name: Install dependencies
        run: bun install

      - name: Check types
        run: bun run types

  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        name: Install Bun

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run build --filter docs

  validate-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        name: Install Bun

      - name: Install dependencies
        run: bun install

      - name: Validate configs
        run: bun validate:configs
